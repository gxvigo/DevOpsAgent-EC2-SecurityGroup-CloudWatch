AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 webserver with CloudWatch alarm, returning Hello World

Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    Description: EC2 instance type
  LatestAmiId:
    Type: String
    Default: ami-0c3389a4fa5bddaad
    Description: EC2 AMI ID (pinned to avoid uncontrolled instance replacement)
  CertificateArn:
    Type: String
    Description: ACM certificate ARN for HTTPS

Resources:
  # --- Networking ---

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: devops-webserver-vpc
        - Key: application_id
          Value: app01

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: devops-webserver-igw
        - Key: application_id
          Value: app01

  IGWAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: devops-webserver-public-1
        - Key: application_id
          Value: app01

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: devops-webserver-public-2
        - Key: application_id
          Value: app01

  PrivateSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.3.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: devops-webserver-private
        - Key: application_id
          Value: app01

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: devops-webserver-public-rt
        - Key: application_id
          Value: app01

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: IGWAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  NATElasticIP:
    Type: AWS::EC2::EIP
    DependsOn: IGWAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: devops-webserver-nat-eip
        - Key: application_id
          Value: app01

  NATGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NATElasticIP.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: devops-webserver-nat
        - Key: application_id
          Value: app01

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: devops-webserver-private-rt
        - Key: application_id
          Value: app01

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NATGateway

  PrivateSubnetRTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet
      RouteTableId: !Ref PrivateRouteTable

  # --- Application ---
  WebServerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: devops-webserver-ec2-sg
      GroupDescription: Allow HTTP from ALB only
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: devops-webserver-ec2-sg
        - Key: application_id
          Value: app01

  WebServerSGIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref WebServerSecurityGroup
      IpProtocol: tcp
      FromPort: 8080
      ToPort: 8080
      SourceSecurityGroupId: !Ref ALBSecurityGroup

  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: devops-webserver-alb-sg
      GroupDescription: Allow HTTP access to ALB
      VpcId: !Ref VPC
      SecurityGroupIngress: []
      Tags:
        - Key: Name
          Value: devops-webserver-alb-sg
        - Key: application_id
          Value: app01

  ALBSGIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !GetAtt ALBSecurityGroup.GroupId
      IpProtocol: tcp
      FromPort: 80
      ToPort: 80
      CidrIp: 0.0.0.0/0

  ALBSGIngressHTTPS:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !GetAtt ALBSecurityGroup.GroupId
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      CidrIp: 0.0.0.0/0

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: devops-webserver-alb
      Scheme: internet-facing
      Type: application
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      Tags:
        - Key: application_id
          Value: app01

  ALBTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: devops-webserver-tg
      Port: 80
      Protocol: HTTP
      VpcId: !Ref VPC
      TargetType: instance
      Targets:
        - Id: !Ref WebServerInstanceV4
      HealthCheckPath: /index.html
      HealthCheckIntervalSeconds: 5
      HealthCheckTimeoutSeconds: 2
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 2
      Tags:
        - Key: application_id
          Value: app01

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: '443'
            StatusCode: HTTP_301

  ALBListenerHTTPS:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref CertificateArn
      DefaultActions:
        - Type: authenticate-cognito
          Order: 1
          AuthenticateCognitoConfig:
            UserPoolArn: !GetAtt CognitoUserPool.Arn
            UserPoolClientId: !Ref CognitoUserPoolClient
            UserPoolDomain: !Ref CognitoUserPoolDomain
        - Type: forward
          Order: 2
          TargetGroupArn: !Ref ALBTargetGroup

  # --- Cognito ---

  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: devops-webserver-users
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      Schema:
        - Name: email
          Required: true
          Mutable: true
      UserPoolTags:
        application_id: app01

  CognitoUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub devops-webserver-${AWS::AccountId}
      UserPoolId: !Ref CognitoUserPool

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: devops-webserver-alb
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: true
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - openid
      AllowedOAuthFlowsUserPoolClient: true
      SupportedIdentityProviders:
        - COGNITO
      CallbackURLs:
        - !Sub https://${ApplicationLoadBalancer.DNSName}/oauth2/idpresponse
      LogoutURLs:
        - !Sub https://${ApplicationLoadBalancer.DNSName}/index.html

  WebServerInstanceV4:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref LatestAmiId
      SubnetId: !Ref PrivateSubnet
      SecurityGroupIds:
        - !Ref WebServerSecurityGroup
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          yum install -y httpd
          systemctl enable httpd
          systemctl start httpd
          cat <<'HTMLEOF' > /var/www/html/index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>AWS DevOps Agent — Workshop</title>
            <style>
              *{margin:0;padding:0;box-sizing:border-box}
              html,body{height:100%}
              body{display:flex;align-items:center;justify-content:center;padding:24px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);color:#fff;overflow:hidden}
              .container{width:100%;max-width:920px;animation:fadeUp .8s ease-out}
              .badge{display:inline-block;padding:5px 14px;border:1px solid rgba(255,255,255,.2);border-radius:20px;font-size:.75rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px;backdrop-filter:blur(4px);background:rgba(255,255,255,.05)}
              h1{font-size:clamp(1.6rem,3.2vw,2.6rem);font-weight:700;line-height:1.15;letter-spacing:-.02em;white-space:nowrap}
              h1 .accent{background:linear-gradient(to right,#a78bfa,#60a5fa,#34d399);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
              .subtitle{margin-top:12px;font-size:.95rem;max-width:720px;color:rgba(255,255,255,.65);line-height:1.5}
              .agenda{margin-top:28px;padding:22px 26px;border:1px solid rgba(255,255,255,.1);border-radius:14px;background:rgba(255,255,255,.04);backdrop-filter:blur(8px)}
              .agenda-header{display:grid;grid-template-columns:140px 1fr;gap:16px;padding-bottom:8px;margin-bottom:6px;border-bottom:1px solid rgba(255,255,255,.1);font-size:.7rem;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.5)}
              .agenda ul{list-style:none}
              .agenda li{display:grid;grid-template-columns:140px 1fr;gap:16px;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:.92rem}
              .agenda li:last-child{border-bottom:none}
              .agenda li .time{font-variant-numeric:tabular-nums;font-weight:600;color:#a78bfa;letter-spacing:.02em}
              .agenda li .session{color:rgba(255,255,255,.92)}
              footer{margin-top:18px;display:flex;align-items:center;gap:8px;font-size:.8rem;color:rgba(255,255,255,.4)}
              .pulse{width:8px;height:8px;background:#34d399;border-radius:50%;animation:pulse 2s infinite}
              @keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
              @keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(52,211,153,.4)}50%{opacity:.7;box-shadow:0 0 0 10px rgba(52,211,153,0)}}
              @media (max-height:720px){.agenda{margin-top:20px;padding:16px 22px}.agenda li{padding:6px 0;font-size:.86rem}.subtitle{margin-top:10px;font-size:.9rem}}
            </style>
          </head>
          <body>
            <main class="container" role="main">
              <div class="badge">AWS Workshop</div>
              <h1>Welcome to the <span class="accent">AWS DevOps Agent</span> Workshop</h1>
              <p class="subtitle">Investigate, diagnose, and remediate cloud incidents with an AI agent that works alongside your team.</p>
              <section class="agenda" aria-labelledby="agenda-heading">
                <div class="agenda-header" id="agenda-heading"><span>Time</span><span>Session</span></div>
                <ul>
                  <li><span class="time">11:30 – 12:30</span><span class="session">Registration and lunch</span></li>
                  <li><span class="time">12:30 – 12:50</span><span class="session">Introduction to AIOps and AWS DevOps Agent</span></li>
                  <li><span class="time">12:50 – 13:10</span><span class="session">DevOps Agent demo / walkthrough</span></li>
                  <li><span class="time">13:10 – 13:30</span><span class="session">Best practices</span></li>
                  <li><span class="time">13:30 – 13:50</span><span class="session">Voice of the customer – Mitre10</span></li>
                  <li><span class="time">13:50 – 14:00</span><span class="session">Q&amp;A</span></li>
                  <li><span class="time">14:00 – 16:00</span><span class="session">Hands-on workshop (with afternoon re-charge)</span></li>
                  <li><span class="time">16:00 – 16:10</span><span class="session">Quiz</span></li>
                  <li><span class="time">16:10 – 16:30</span><span class="session">Q&amp;A and networking</span></li>
                </ul>
              </section>
              <footer>
                <span class="pulse" aria-hidden="true"></span>
                <span>System operational</span>
              </footer>
            </main>
          </body>
          </html>
          HTMLEOF

          # Install and configure the CloudWatch agent to push Apache logs
          yum install -y amazon-cloudwatch-agent
          cat <<'EOF' > /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json
          {
            "logs": {
              "logs_collected": {
                "files": {
                  "collect_list": [
                    {
                      "file_path": "/var/log/httpd/error_log",
                      "log_group_name": "${WebServerErrorLogGroup}",
                      "log_stream_name": "{instance_id}"
                    },
                    {
                      "file_path": "/var/log/httpd/access_log",
                      "log_group_name": "${WebServerAccessLogGroup}",
                      "log_stream_name": "{instance_id}"
                    }
                  ]
                }
              }
            }
          }
          EOF
          /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl \
            -a fetch-config -m ec2 \
            -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json -s
      IamInstanceProfile: !Ref InstanceProfile
      Tags:
        - Key: Name
          Value: devops-webserver
        - Key: application_id
          Value: app01

  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: application_id
          Value: app01

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref InstanceRole

  WebServerErrorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /webserver/${AWS::StackName}/error_log
      RetentionInDays: 7
      Tags:
        - Key: application_id
          Value: app01

  WebServerAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /webserver/${AWS::StackName}/access_log
      RetentionInDays: 7
      Tags:
        - Key: application_id
          Value: app01

  # --- Synthetics Canary ---

  CanaryArtifactBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Delete
    Properties:
      LifecycleConfiguration:
        Rules:
          - Id: ExpireArtifacts
            Status: Enabled
            ExpirationInDays: 7
      Tags:
        - Key: application_id
          Value: app01

  EmptyBucketLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EmptyBucketPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:ListBucketVersions
                Resource: !GetAtt CanaryArtifactBucket.Arn
              - Effect: Allow
                Action:
                  - s3:DeleteObject
                  - s3:DeleteObjectVersion
                Resource: !Sub ${CanaryArtifactBucket.Arn}/*
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*
      Tags:
        - Key: application_id
          Value: app01

  EmptyBucketFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Timeout: 120
      Role: !GetAtt EmptyBucketLambdaRole.Arn
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          def handler(event, context):
              try:
                  if event['RequestType'] == 'Delete':
                      bucket = event['ResourceProperties']['BucketName']
                      s3 = boto3.resource('s3')
                      bucket_resource = s3.Bucket(bucket)
                      bucket_resource.object_versions.all().delete()
                      bucket_resource.objects.all().delete()
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  print(f"Error: {e}")
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
      Tags:
        - Key: application_id
          Value: app01

  EmptyBucketOnDelete:
    Type: Custom::EmptyBucket
    Properties:
      ServiceToken: !GetAtt EmptyBucketFunction.Arn
      BucketName: !Ref CanaryArtifactBucket

  CanaryRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CanaryPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource: !Sub ${CanaryArtifactBucket.Arn}/*
              - Effect: Allow
                Action:
                  - s3:GetBucketLocation
                  - s3:ListBucket
                Resource: !GetAtt CanaryArtifactBucket.Arn
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/cwsyn-*
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                Resource: '*'
                Condition:
                  StringEquals:
                    cloudwatch:namespace: CloudWatchSynthetics
      Tags:
        - Key: application_id
          Value: app01

  HeartbeatCanary:
    Type: AWS::Synthetics::Canary
    Properties:
      Name: webserver-heartbeat
      RuntimeVersion: syn-nodejs-puppeteer-9.1
      ArtifactS3Location: !Sub s3://${CanaryArtifactBucket}
      ExecutionRoleArn: !GetAtt CanaryRole.Arn
      Schedule:
        Expression: rate(1 minute)
      StartCanaryAfterCreation: true
      Code:
        Handler: index.handler
        Script: !Sub |
          const { URL } = require('url');
          const synthetics = require('Synthetics');
          const log = require('SyntheticsLogger');

          const handler = async () => {
            const url = 'http://${ApplicationLoadBalancer.DNSName}/index.html';
            log.info('Checking URL: ' + url);
            const page = await synthetics.getPage();
            const response = await page.goto(url, { waitUntil: 'domcontentloaded', timeout: 30000 });
            if (response.status() !== 200) {
              throw new Error('Expected 200 but got ' + response.status());
            }
            log.info('Heartbeat check passed');
          };

          exports.handler = async () => {
            return await synthetics.executeStep('heartbeat', handler);
          };
      Tags:
        - Key: application_id
          Value: app01

  CanaryFailedAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Alarm when the heartbeat canary fails
      Namespace: CloudWatchSynthetics
      MetricName: SuccessPercent
      Dimensions:
        - Name: CanaryName
          Value: !Ref HeartbeatCanary
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 100
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching
      Tags:
        - Key: application_id
          Value: app01

Outputs:
  PrivateIp:
    Description: Private IP address of the EC2 instance
    Value: !GetAtt WebServerInstanceV4.PrivateIp
  ALBDnsName:
    Description: DNS name of the Application Load Balancer
    Value: !GetAtt ApplicationLoadBalancer.DNSName
  HelloWorldUrl:
    Description: URL to test the Hello World app via ALB
    Value: !Sub https://${ApplicationLoadBalancer.DNSName}/index.html
  CognitoSignUpUrl:
    Description: Cognito hosted UI for user sign-up
    Value: !Sub https://devops-webserver-${AWS::AccountId}.auth.${AWS::Region}.amazoncognito.com/signup?client_id=${CognitoUserPoolClient}&response_type=code&scope=openid&redirect_uri=https://${ApplicationLoadBalancer.DNSName}/oauth2/idpresponse
