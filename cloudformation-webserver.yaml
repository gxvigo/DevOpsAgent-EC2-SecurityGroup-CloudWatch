AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 webserver with CloudWatch alarm, returning Hello World

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID where resources will be deployed
  PublicSubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Public subnet ID for the EC2 instance
  PublicSubnetId2:
    Type: AWS::EC2::Subnet::Id
    Description: Second public subnet in a different AZ (required by ALB)
  PrivateSubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Private subnet ID for the EC2 instance
  InstanceType:
    Type: String
    Default: t3.micro
    Description: EC2 instance type
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: Latest Amazon Linux 2023 AMI

Resources:
  WebServerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP from ALB only
      VpcId: !Ref VpcId
      Tags:
        - Key: application_id
          Value: app01

  WebServerSGIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref WebServerSecurityGroup
      IpProtocol: tcp
      FromPort: 80
      ToPort: 80
      SourceSecurityGroupId: !Ref ALBSecurityGroup

  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP access to ALB
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 2.0.0.0/0
      Tags:
        - Key: application_id
          Value: app01

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Scheme: internet-facing
      Type: application
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Subnets:
        - !Ref PublicSubnetId
        - !Ref PublicSubnetId2
      Tags:
        - Key: application_id
          Value: app01

  ALBTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Port: 80
      Protocol: HTTP
      VpcId: !Ref VpcId
      TargetType: instance
      Targets:
        - Id: !Ref WebServerInstance
      HealthCheckPath: /index.html
      Tags:
        - Key: application_id
          Value: app01

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ALBTargetGroup

  WebServerInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref LatestAmiId
      SubnetId: !Ref PrivateSubnetId
      SecurityGroupIds:
        - !Ref WebServerSecurityGroup
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          yum install -y httpd
          systemctl enable httpd
          systemctl start httpd
          cat <<'HTMLEOF' > /var/www/html/index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>app01</title>
            <style>
              *{margin:0;padding:0;box-sizing:border-box}
              body{min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);color:#fff;overflow:hidden}
              .container{text-align:center;animation:fadeUp .8s ease-out}
              .badge{display:inline-block;padding:6px 16px;border:1px solid rgba(255,255,255,.2);border-radius:20px;font-size:.8rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:24px;backdrop-filter:blur(4px);background:rgba(255,255,255,.05)}
              h1{font-size:clamp(3rem,8vw,6rem);font-weight:700;background:linear-gradient(to right,#a78bfa,#60a5fa,#34d399);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1}
              p{margin-top:16px;font-size:1.1rem;color:rgba(255,255,255,.6)}
              .pulse{width:8px;height:8px;background:#34d399;border-radius:50%;display:inline-block;margin-right:8px;animation:pulse 2s infinite;vertical-align:middle}
              .status{margin-top:40px;font-size:.85rem;color:rgba(255,255,255,.4)}
              @keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
              @keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(52,211,153,.4)}50%{opacity:.7;box-shadow:0 0 0 10px rgba(52,211,153,0)}}
            </style>
          </head>
          <body>
            <main class="container" role="main">
              <div class="badge">app01</div>
              <h1>Hello <span id="name">World</span></h1>
              <p>Your webserver is up and running.</p>
              <div class="status"><span class="pulse" aria-hidden="true"></span>System operational</div>
            </main>
            <script>
              var name = new URLSearchParams(window.location.search).get('name');
              if (name) document.getElementById('name').textContent = name;
            </script>
          </body>
          </html>
          HTMLEOF

          # Install and configure the CloudWatch agent to push Apache logs
          yum install -y amazon-cloudwatch-agent
          cat <<'EOF' > /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json
          {
            "logs": {
              "logs_collected": {
                "files": {
                  "collect_list": [
                    {
                      "file_path": "/var/log/httpd/error_log",
                      "log_group_name": "${WebServerErrorLogGroup}",
                      "log_stream_name": "{instance_id}"
                    },
                    {
                      "file_path": "/var/log/httpd/access_log",
                      "log_group_name": "${WebServerAccessLogGroup}",
                      "log_stream_name": "{instance_id}"
                    }
                  ]
                }
              }
            }
          }
          EOF
          /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl \
            -a fetch-config -m ec2 \
            -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json -s
      IamInstanceProfile: !Ref InstanceProfile
      Tags:
        - Key: Name
          Value: webserver
        - Key: application_id
          Value: app01

  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: application_id
          Value: app01

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref InstanceRole

  WebServerErrorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /webserver/${AWS::StackName}/error_log
      RetentionInDays: 7
      Tags:
        - Key: application_id
          Value: app01

  WebServerAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /webserver/${AWS::StackName}/access_log
      RetentionInDays: 7
      Tags:
        - Key: application_id
          Value: app01

  # --- Synthetics Canary ---

  CanaryArtifactBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Delete
    Properties:
      LifecycleConfiguration:
        Rules:
          - Id: ExpireArtifacts
            Status: Enabled
            ExpirationInDays: 7
      Tags:
        - Key: application_id
          Value: app01

  CanaryRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CanaryPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource: !Sub ${CanaryArtifactBucket.Arn}/*
              - Effect: Allow
                Action:
                  - s3:GetBucketLocation
                  - s3:ListBucket
                Resource: !GetAtt CanaryArtifactBucket.Arn
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/cwsyn-*
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                Resource: '*'
                Condition:
                  StringEquals:
                    cloudwatch:namespace: CloudWatchSynthetics
      Tags:
        - Key: application_id
          Value: app01

  HeartbeatCanary:
    Type: AWS::Synthetics::Canary
    Properties:
      Name: webserver-heartbeat
      RuntimeVersion: syn-nodejs-puppeteer-9.1
      ArtifactS3Location: !Sub s3://${CanaryArtifactBucket}
      ExecutionRoleArn: !GetAtt CanaryRole.Arn
      Schedule:
        Expression: rate(1 minute)
      StartCanaryAfterCreation: true
      Code:
        Handler: index.handler
        Script: !Sub |
          const { URL } = require('url');
          const synthetics = require('Synthetics');
          const log = require('SyntheticsLogger');

          const handler = async () => {
            const url = 'http://${ApplicationLoadBalancer.DNSName}/index.html';
            log.info('Checking URL: ' + url);
            const page = await synthetics.getPage();
            const response = await page.goto(url, { waitUntil: 'domcontentloaded', timeout: 30000 });
            if (response.status() !== 200) {
              throw new Error('Expected 200 but got ' + response.status());
            }
            log.info('Heartbeat check passed');
          };

          exports.handler = async () => {
            return await synthetics.executeStep('heartbeat', handler);
          };
      Tags:
        - Key: application_id
          Value: app01

  CanaryFailedAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Alarm when the heartbeat canary fails
      Namespace: CloudWatchSynthetics
      MetricName: SuccessPercent
      Dimensions:
        - Name: CanaryName
          Value: !Ref HeartbeatCanary
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 100
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching
      Tags:
        - Key: application_id
          Value: app01

Outputs:
  PrivateIp:
    Description: Private IP address of the EC2 instance
    Value: !GetAtt WebServerInstance.PrivateIp
  ALBDnsName:
    Description: DNS name of the Application Load Balancer
    Value: !GetAtt ApplicationLoadBalancer.DNSName
  HelloWorldUrl:
    Description: URL to test the Hello World app via ALB
    Value: !Sub http://${ApplicationLoadBalancer.DNSName}/index.html
