AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 webserver with CloudWatch alarm, returning webpage

Parameters:
  InstanceType:
    Type: String
    Default: t3.micro
    Description: EC2 instance type
  LatestAmiId:
    Type: String
    Default: ami-0c3389a4fa5bddaad
    Description: EC2 AMI ID (pinned to avoid uncontrolled instance replacement)
  CertificateArn:
    Type: String
    Description: ACM certificate ARN for HTTPS
  EnableAlarms:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Set to false to disable CloudWatch alarms (useful for demo scenarios)

Conditions:
  AlarmsEnabled: !Equals [!Ref EnableAlarms, 'true']

Resources:
  # --- Networking ---

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: devops-webserver-vpc
        - Key: application_id
          Value: app01

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: devops-webserver-igw
        - Key: application_id
          Value: app01

  IGWAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: devops-webserver-public-1
        - Key: application_id
          Value: app01

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: devops-webserver-public-2
        - Key: application_id
          Value: app01

  PrivateSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.3.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: devops-webserver-private
        - Key: application_id
          Value: app01

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: devops-webserver-public-rt
        - Key: application_id
          Value: app01

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: IGWAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  NATElasticIP:
    Type: AWS::EC2::EIP
    DependsOn: IGWAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: devops-webserver-nat-eip
        - Key: application_id
          Value: app01

  NATGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NATElasticIP.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: devops-webserver-nat
        - Key: application_id
          Value: app01

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: devops-webserver-private-rt
        - Key: application_id
          Value: app01

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NATGateway

  PrivateSubnetRTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet
      RouteTableId: !Ref PrivateRouteTable

  # --- Application ---
  WebServerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: devops-webserver-ec2-sg
      GroupDescription: Allow HTTP from ALB only
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: devops-webserver-ec2-sg
        - Key: application_id
          Value: app01

  WebServerSGIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref WebServerSecurityGroup
      IpProtocol: tcp
      FromPort: 8080
      ToPort: 8080
      SourceSecurityGroupId: !Ref ALBSecurityGroup

  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: devops-webserver-alb-sg
      GroupDescription: Allow HTTP access to ALB
      VpcId: !Ref VPC
      SecurityGroupIngress: []
      Tags:
        - Key: Name
          Value: devops-webserver-alb-sg
        - Key: application_id
          Value: app01

  ALBSGIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !GetAtt ALBSecurityGroup.GroupId
      IpProtocol: tcp
      FromPort: 80
      ToPort: 80
      CidrIp: 0.0.0.0/0

  ALBSGIngressHTTPS:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !GetAtt ALBSecurityGroup.GroupId
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      CidrIp: 0.0.0.0/0

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: devops-webserver-alb
      Scheme: internet-facing
      Type: application
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      Tags:
        - Key: application_id
          Value: app01

  ALBTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: devops-webserver-tg
      Port: 80
      Protocol: HTTP
      VpcId: !Ref VPC
      TargetType: instance
      Targets:
        - Id: !Ref WebServerInstanceV6
      HealthCheckPath: /index.html
      HealthCheckIntervalSeconds: 5
      HealthCheckTimeoutSeconds: 2
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 2
      Tags:
        - Key: application_id
          Value: app01

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: '443'
            StatusCode: HTTP_301

  ALBListenerHTTPS:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref CertificateArn
      DefaultActions:
        - Type: authenticate-cognito
          Order: 1
          AuthenticateCognitoConfig:
            UserPoolArn: !GetAtt CognitoUserPool.Arn
            UserPoolClientId: !Ref CognitoUserPoolClient
            UserPoolDomain: !Ref CognitoUserPoolDomain
        - Type: forward
          Order: 2
          TargetGroupArn: !Ref ALBTargetGroup

  # --- Cognito ---

  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: devops-webserver-users
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      Schema:
        - Name: email
          Required: true
          Mutable: true
      UserPoolTags:
        application_id: app01

  CognitoUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub devops-webserver-${AWS::AccountId}
      UserPoolId: !Ref CognitoUserPool

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: devops-webserver-alb
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: true
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - openid
      AllowedOAuthFlowsUserPoolClient: true
      SupportedIdentityProviders:
        - COGNITO
      CallbackURLs:
        - !Sub https://${ApplicationLoadBalancer.DNSName}/oauth2/idpresponse
      LogoutURLs:
        - !Sub https://${ApplicationLoadBalancer.DNSName}/index.html

  WebServerInstanceV6:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref LatestAmiId
      SubnetId: !Ref PrivateSubnet
      SecurityGroupIds:
        - !Ref WebServerSecurityGroup
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          yum install -y httpd
          systemctl enable httpd
          systemctl start httpd
          cat <<'HTMLEOF' > /var/www/html/index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Aurora Bank</title>
            <style>
              *{margin:0;padding:0;box-sizing:border-box}
              html,body{height:100%}
              body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);color:#fff;display:flex;flex-direction:column;min-height:100vh}
              .brand{display:flex;align-items:center;gap:10px;font-weight:700;letter-spacing:-.01em}
              .brand-mark{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#a78bfa,#34d399);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#0f0c29}
              .login-view{flex:1;display:flex;align-items:center;justify-content:center;padding:24px}
              .login-card{width:100%;max-width:420px;padding:40px 36px;border:1px solid rgba(255,255,255,.1);border-radius:18px;background:rgba(255,255,255,.04);backdrop-filter:blur(12px);box-shadow:0 20px 60px rgba(0,0,0,.4);animation:fadeUp .7s ease-out}
              .login-brand{justify-content:center;margin-bottom:32px;font-size:1.2rem}
              .login-card h1{font-size:1.5rem;font-weight:600;margin-bottom:6px;letter-spacing:-.02em}
              .login-card p.hint{color:rgba(255,255,255,.55);font-size:.9rem;margin-bottom:28px}
              .field{margin-bottom:16px}
              .field label{display:block;font-size:.75rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.55);margin-bottom:8px}
              .field input{width:100%;padding:12px 14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:10px;color:#fff;font-size:.95rem;font-family:inherit;transition:border-color .2s,background .2s}
              .field input:focus{outline:none;border-color:#a78bfa;background:rgba(255,255,255,.08)}
              .actions{margin-top:24px}
              .btn{display:block;width:100%;padding:13px 16px;border:none;border-radius:10px;background:linear-gradient(to right,#a78bfa,#60a5fa);color:#0f0c29;font-weight:600;font-size:.95rem;font-family:inherit;cursor:pointer;letter-spacing:.02em;transition:transform .15s,filter .15s}
              .btn:hover{filter:brightness(1.08);transform:translateY(-1px)}
              .btn:active{transform:translateY(0)}
              .demo-note{margin-top:24px;text-align:center;font-size:.75rem;color:rgba(255,255,255,.4);letter-spacing:.5px}
              .app-view{display:none;flex-direction:column;flex:1}
              .app-view.show{display:flex}
              .app-nav{display:flex;align-items:center;justify-content:space-between;padding:18px 32px;border-bottom:1px solid rgba(255,255,255,.08);background:rgba(0,0,0,.2)}
              .app-nav .brand{font-size:1rem}
              .app-nav .user{display:flex;align-items:center;gap:14px;font-size:.9rem}
              .app-nav .user .name{color:rgba(255,255,255,.85)}
              .app-nav .user .avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#a78bfa,#34d399);display:flex;align-items:center;justify-content:center;font-weight:700;color:#0f0c29;font-size:.85rem}
              .signout{color:rgba(255,255,255,.5);font-size:.85rem;background:none;border:none;cursor:pointer;font-family:inherit;transition:color .2s}
              .signout:hover{color:#fff}
              .app-main{flex:1;padding:32px;max-width:1080px;margin:0 auto;width:100%;animation:fadeUp .6s ease-out}
              .balance-card{padding:32px;border:1px solid rgba(255,255,255,.1);border-radius:18px;background:linear-gradient(135deg,rgba(167,139,250,.15),rgba(96,165,250,.08));margin-bottom:32px}
              .balance-card .label{font-size:.75rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:12px}
              .balance-card .amount{font-size:clamp(2.4rem,5vw,3.4rem);font-weight:700;letter-spacing:-.02em;font-variant-numeric:tabular-nums;background:linear-gradient(to right,#a78bfa,#60a5fa,#34d399);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
              .balance-card .account{margin-top:8px;font-size:.85rem;color:rgba(255,255,255,.5);font-variant-numeric:tabular-nums;letter-spacing:.05em}
              .transactions h2{font-size:.8rem;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.55);margin-bottom:16px}
              .tx-list{border:1px solid rgba(255,255,255,.08);border-radius:14px;background:rgba(255,255,255,.03);overflow:hidden}
              .tx{display:grid;grid-template-columns:110px 1fr 130px 130px;align-items:center;gap:16px;padding:14px 22px;border-bottom:1px solid rgba(255,255,255,.06);font-size:.92rem}
              .tx:last-child{border-bottom:none}
              .tx .date{color:rgba(255,255,255,.45);font-size:.85rem}
              .tx .desc{color:rgba(255,255,255,.92);font-weight:500}
              .tx .cat{justify-self:start;padding:3px 10px;border-radius:20px;background:rgba(255,255,255,.06);font-size:.72rem;letter-spacing:.5px;color:rgba(255,255,255,.7)}
              .tx .amt{text-align:right;font-variant-numeric:tabular-nums;font-weight:600}
              .tx .amt.pos{color:#34d399}
              .tx .amt.neg{color:rgba(255,255,255,.85)}
              @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
              @media(max-width:640px){.tx{grid-template-columns:1fr 110px;gap:8px}.tx .date{grid-column:1/3;margin-bottom:-4px}.tx .cat{display:none}.app-main{padding:20px}.app-nav{padding:14px 20px}}
            </style>
          </head>
          <body>
            <div class="login-view" id="loginView">
              <div class="login-card">
                <div class="brand login-brand"><span class="brand-mark">A</span><span>Aurora Bank</span></div>
                <h1>Welcome back</h1>
                <p class="hint">Sign in to access your account.</p>
                <form id="loginForm" autocomplete="off">
                  <div class="field"><label for="username">Username</label><input type="text" id="username" name="username" value="alex.morgan"></div>
                  <div class="field"><label for="password">Password</label><input type="password" id="password" name="password" value="workshop123"></div>
                  <div class="actions"><button type="submit" class="btn">Sign in</button></div>
                </form>
                <p class="demo-note">Demo environment &middot; any value works</p>
              </div>
            </div>
            <div class="app-view" id="appView">
              <nav class="app-nav">
                <div class="brand"><span class="brand-mark">A</span><span>Aurora Bank</span></div>
                <div class="user"><span class="name">Alex Morgan</span><span class="avatar">AM</span><button class="signout" id="signOutBtn">Sign out</button></div>
              </nav>
              <main class="app-main">
                <div class="balance-card">
                  <div class="label">Available balance</div>
                  <div class="amount">$14,287.65</div>
                  <div class="account">Checking &middot;&middot;&middot;&middot; 4823</div>
                </div>
                <section class="transactions">
                  <h2>Recent transactions</h2>
                  <div class="tx-list">
                    <div class="tx"><span class="date">Today</span><span class="desc">Direct deposit &mdash; ACME Corp</span><span class="cat">Income</span><span class="amt pos">+$3,250.00</span></div>
                    <div class="tx"><span class="date">Today</span><span class="desc">Whole Foods Market</span><span class="cat">Groceries</span><span class="amt neg">&minus;$87.42</span></div>
                    <div class="tx"><span class="date">Yesterday</span><span class="desc">Uber</span><span class="cat">Transport</span><span class="amt neg">&minus;$14.30</span></div>
                    <div class="tx"><span class="date">Yesterday</span><span class="desc">Netflix</span><span class="cat">Subscription</span><span class="amt neg">&minus;$15.99</span></div>
                    <div class="tx"><span class="date">2 days ago</span><span class="desc">Starbucks</span><span class="cat">Food &amp; drink</span><span class="amt neg">&minus;$6.75</span></div>
                    <div class="tx"><span class="date">3 days ago</span><span class="desc">Apple Store</span><span class="cat">Shopping</span><span class="amt neg">&minus;$1,299.00</span></div>
                    <div class="tx"><span class="date">4 days ago</span><span class="desc">Shell</span><span class="cat">Fuel</span><span class="amt neg">&minus;$58.20</span></div>
                    <div class="tx"><span class="date">5 days ago</span><span class="desc">AWS</span><span class="cat">Subscription</span><span class="amt neg">&minus;$112.50</span></div>
                    <div class="tx"><span class="date">6 days ago</span><span class="desc">Lyft</span><span class="cat">Transport</span><span class="amt neg">&minus;$22.80</span></div>
                    <div class="tx"><span class="date">7 days ago</span><span class="desc">Spotify</span><span class="cat">Subscription</span><span class="amt neg">&minus;$9.99</span></div>
                  </div>
                </section>
              </main>
            </div>
            <script>
              (function () {
                var loginView = document.getElementById('loginView');
                var appView = document.getElementById('appView');
                var form = document.getElementById('loginForm');
                var signOut = document.getElementById('signOutBtn');
                form.addEventListener('submit', function (e) {
                  e.preventDefault();
                  loginView.style.display = 'none';
                  appView.classList.add('show');
                });
                signOut.addEventListener('click', function () {
                  appView.classList.remove('show');
                  loginView.style.display = 'flex';
                });
              })();
            </script>
          </body>
          </html>
          HTMLEOF

          # Install and configure the CloudWatch agent to push Apache logs
          yum install -y amazon-cloudwatch-agent
          cat <<'EOF' > /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json
          {
            "logs": {
              "logs_collected": {
                "files": {
                  "collect_list": [
                    {
                      "file_path": "/var/log/httpd/error_log",
                      "log_group_name": "${WebServerErrorLogGroup}",
                      "log_stream_name": "{instance_id}"
                    },
                    {
                      "file_path": "/var/log/httpd/access_log",
                      "log_group_name": "${WebServerAccessLogGroup}",
                      "log_stream_name": "{instance_id}"
                    }
                  ]
                }
              }
            }
          }
          EOF
          /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl \
            -a fetch-config -m ec2 \
            -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json -s
      IamInstanceProfile: !Ref InstanceProfile
      Tags:
        - Key: Name
          Value: devops-webserver
        - Key: application_id
          Value: app01

  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: application_id
          Value: app01

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref InstanceRole

  WebServerErrorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /webserver/${AWS::StackName}/error_log
      RetentionInDays: 7
      Tags:
        - Key: application_id
          Value: app01

  WebServerAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /webserver/${AWS::StackName}/access_log
      RetentionInDays: 7
      Tags:
        - Key: application_id
          Value: app01

  # --- Monitoring ---

  ALBUnhealthyHostAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: AlarmsEnabled
    Properties:
      AlarmName: devops-webserver-unhealthy-hosts
      AlarmDescription: ALB target group has no healthy hosts — EC2 instance unreachable
      Namespace: AWS/ApplicationELB
      MetricName: HealthyHostCount
      Dimensions:
        - Name: TargetGroup
          Value: !GetAtt ALBTargetGroup.TargetGroupFullName
        - Name: LoadBalancer
          Value: !GetAtt ApplicationLoadBalancer.LoadBalancerFullName
      Statistic: Minimum
      Period: 60
      EvaluationPeriods: 2
      Threshold: 1
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching
      Tags:
        - Key: application_id
          Value: app01

  ALB5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: AlarmsEnabled
    Properties:
      AlarmName: devops-webserver-5xx-errors
      AlarmDescription: ALB is returning 5xx errors to clients
      Namespace: AWS/ApplicationELB
      MetricName: HTTPCode_ELB_5XX_Count
      Dimensions:
        - Name: LoadBalancer
          Value: !GetAtt ApplicationLoadBalancer.LoadBalancerFullName
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 2
      Threshold: 10
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      Tags:
        - Key: application_id
          Value: app01

Outputs:
  PrivateIp:
    Description: Private IP address of the EC2 instance
    Value: !GetAtt WebServerInstanceV6.PrivateIp
  ALBDnsName:
    Description: DNS name of the Application Load Balancer
    Value: !GetAtt ApplicationLoadBalancer.DNSName
  HelloWorldUrl:
    Description: URL to test the Hello World app via ALB
    Value: !Sub https://${ApplicationLoadBalancer.DNSName}/index.html
  CognitoSignUpUrl:
    Description: Cognito hosted UI for user sign-up
    Value: !Sub https://devops-webserver-${AWS::AccountId}.auth.${AWS::Region}.amazoncognito.com/signup?client_id=${CognitoUserPoolClient}&response_type=code&scope=openid&redirect_uri=https://${ApplicationLoadBalancer.DNSName}/oauth2/idpresponse
