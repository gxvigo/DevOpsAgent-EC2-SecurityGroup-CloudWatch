<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
      overflow: hidden;
    }

    .container {
      text-align: center;
      animation: fadeUp 0.8s ease-out;
    }

    .badge {
      display: inline-block;
      padding: 6px 16px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      font-size: 0.8rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 24px;
      backdrop-filter: blur(4px);
      background: rgba(255,255,255,0.05);
    }

    h1 {
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 700;
      background: linear-gradient(to right, #a78bfa, #60a5fa, #34d399);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.1;
    }

    p {
      margin-top: 16px;
      font-size: 1.1rem;
      color: rgba(255,255,255,0.6);
    }

    .pulse {
      width: 8px;
      height: 8px;
      background: #34d399;
      border-radius: 50%;
      display: inline-block;
      margin-right: 8px;
      animation: pulse 2s infinite;
      vertical-align: middle;
    }

    .status {
      margin-top: 40px;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.4);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(52,211,153,0.4); }
      50% { opacity: 0.7; box-shadow: 0 0 0 10px rgba(52,211,153,0); }
    }
  </style>
</head>
<body>
  <main class="container" role="main">
    <div class="badge">app01</div>
    <h1>Hello <span id="name">World</span></h1>
    <p>Your webserver is up and running.</p>
    <div class="status"><span class="pulse" aria-hidden="true"></span>System operational</div>
  </main>
  <script>
    const name = new URLSearchParams(window.location.search).get('name');
    if (name) document.getElementById('name').textContent = name;
  </script>
</body>
</html>
